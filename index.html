<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系統合約續約 — 簽署進度查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg:          #EDE8DF;
    --color-surface:     #F5F2EC;
    --color-surface-low: #D9D3C7;
    --color-text:        #2C3A4A;
    --color-text-s:      #5A6A7A;
    --color-text-d:      #9AABB8;
    --color-primary:     #B96748;
    --color-primary-d:   #9A5038;
    --color-primary-sub: #E8C4B0;
    --color-success:     #4A7A65;
    --color-success-sub: #C5D9D2;
    --color-warning:     #9A7845;
    --color-warning-sub: #E5D8BE;
    --shadow: 0 4px 8px rgba(44,58,74,.12), 0 2px 4px rgba(44,58,74,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }
  .header { max-width: 720px; margin: 0 auto 28px; }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header p  { font-size: 13px; color: var(--color-text-s); }

  .search-wrap {
    max-width: 720px; margin: 0 auto 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .search-wrap input {
    flex: 1; min-width: 140px; width: 100%; padding: 16px 24px; font-size: 16px;
    border: 1.5px solid var(--color-surface-low);
    border-radius: 8px; background: var(--color-surface);
    color: var(--color-text); font-size: 16px; font-family: inherit; outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: #B96748; }
  .search-wrap input::placeholder { color: var(--color-text-d); }
  .btn {
    height: 52px; padding: 0 20px;
    background: var(--color-primary); color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .btn:hover    { background: var(--color-primary-d); }
  .btn:disabled { background: var(--color-primary-sub); cursor: not-allowed; }

  .status-bar {
    max-width: 720px; margin: 0 auto 14px;
    font-size: 12px; color: var(--color-text-s);
    display: flex; align-items: center; gap: 7px; min-height: 20px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-text-d); flex-shrink: 0; }
  .dot.live { background: var(--color-success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  .message {
    max-width: 720px; margin: 0 auto;
    padding: 20px; border-radius: 8px;
    font-size: 14px; text-align: center;
  }
  .message.error   { background: #E9D7D5; color: #D28187; }
  .message.empty   { background: var(--color-surface); color: var(--color-text-s); }
  .message.loading { background: var(--color-surface); color: var(--color-text-s); }

  .results { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .card { background: var(--color-surface); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .card-head {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--color-surface-low);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .clinic-name { font-size: 15px; font-weight: 600; }
  .renewal-badge {
    flex-shrink: 0;
    background: var(--color-primary-sub); color: var(--color-primary-d);
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 9999px;
  }
  .progress-wrap { padding: 18px 18px 6px; }
  .track { display: flex; align-items: flex-start; }
  .step  { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
  .step:not(:last-child)::after {
    content: ''; position: absolute; top: 13px; left: 50%;
    width: 100%; height: 2px; background: var(--color-surface-low); z-index: 0;
  }
  .step.done:not(:last-child)::after { background: var(--color-success); }
  .step-icon {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; position: relative; z-index: 1;
    border: 2px solid var(--color-surface-low);
    background: var(--color-surface); color: var(--color-text-d);
  }
  .step.done    .step-icon { background: var(--color-success);     border-color: var(--color-success); color: #fff; }
  .step.pending .step-icon { background: var(--color-warning-sub); border-color: var(--color-warning); color: var(--color-warning); }
  .step-label { margin-top: 7px; font-size: 10px; font-weight: 500; color: var(--color-text-s); text-align: center; }
  .step.done    .step-label { color: var(--color-success); }
  .step.pending .step-label { color: var(--color-warning); }
  .step-name {
    margin-top: 2px; font-size: 11px; font-weight: 600; color: var(--color-text);
    text-align: center; max-width: 84px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dates { padding: 4px 18px 16px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
  .date-cell { font-size: 10px; color: var(--color-text-d); text-align: center; line-height: 1.5; }
  .date-cell.done { color: var(--color-text-s); }
  .date-cell span { display: block; font-size: 9px; color: var(--color-text-d); margin-bottom: 1px; text-transform: uppercase; letter-spacing: .04em; }
  .overall {
    margin: 0 18px 14px; padding: 7px 12px;
    border-radius: 8px; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .all-done    { background: var(--color-success-sub); color: var(--color-success); }
  .in-progress { background: var(--color-warning-sub); color: var(--color-warning); }
</style>
</head>
<body>

<div class="header">
  <h1>系統合約續約 — 簽署進度</h1>
  <p>輸入負責 AM 及 診所名稱 即可查詢，有任何問題請 Slack tag Joy。<br>若需更新，請重新查詢<br>＊想一次查負責的多筆，請診所名稱輸入 all 會提供過去兩週的合約資料，感謝各位</p>
</div>

<div class="search-wrap">
  <input id="inputAM" type="text"
    placeholder="AM Name"
    autocomplete="off" autocorrect="off" spellcheck="false">
  <input id="inputClinic" type="text"
    placeholder="Clinic Name"
    autocomplete="off" autocorrect="off" spellcheck="false">
  
  <button class="btn" id="searchBtn" onclick="doSearch()">查詢</button>
</div>

<div class="status-bar">
  <span class="dot" id="dot"></span>
  <span id="statusText">尚未查詢</span>
</div>

<div id="output"></div>

<script>
const N8N_WEBHOOK_URL = 'https://alleypin.app.n8n.cloud/webhook/contract-dashboard';

let currentQuery   = '';
let refreshTimer   = null;
let countdownTimer = null;
let secondsLeft    = 60;

const inputAM     = document.getElementById('inputAM');
const inputClinic = document.getElementById('inputClinic');
const btn         = document.getElementById('searchBtn');
const output      = document.getElementById('output');
const statusText  = document.getElementById('statusText');
const dot         = document.getElementById('dot');

// 記住上次查詢
const saved = localStorage.getItem('last_query');
if (saved && saved.includes('||')) {
  const [am, clinic] = saved.split('||');
  inputAM.value = am;
  if (clinic.toUpperCase() === '__ALL__') {
    document.getElementById('inputAll').checked = true;
  } else {
    inputClinic.value = clinic;
  }
}


inputAM.addEventListener('keydown',     e => { if (e.key === 'Enter') doSearch(); });
inputClinic.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function doSearch() {
  const am     = inputAM.value.trim();
  const clinic = inputClinic.value.trim();
  if (!am || !clinic) {
    output.innerHTML = '<div class="message error">請同時輸入 AM Name 及 Clinic Name</div>';
    return;
  }
  const isAll  = clinic.toLowerCase() === 'all';
currentQuery = isAll ? `${am}||all` : `${am}||${clinic}`;
  localStorage.setItem('last_query', currentQuery);
  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  fetchData(true);
}

async function fetchData(isManual = false) {
  if (!currentQuery) return;
  if (isManual) {
    btn.disabled = true;
    dot.className = 'dot';
    statusText.innerHTML = '查詢中…';
    output.innerHTML = '<div class="message loading">載入中…</div>';
  }
  try {
    const res  = await fetch(`${N8N_WEBHOOK_URL}?q=${encodeURIComponent(currentQuery)}`, {
      method: 'GET',
    });
    const json = await res.json();
    if (json.error) {
      dot.className = 'dot';
      statusText.innerHTML = json.message || '查無資料';
      output.innerHTML = `<div class="message ${json.error === 'not_found' ? 'empty' : 'error'}">${json.message}</div>`;
    } else if (json.mode === 'stats') {
  dot.className = 'dot live';
  renderStats(json.stats);
  startCountdown();
} else {
  dot.className = 'dot live';
  renderContracts(json.contracts);
  startCountdown();
}
  } catch {
    dot.className = 'dot';
    statusText.innerHTML = '連線失敗，請稍後重試';
    output.innerHTML = '<div class="message error">無法連線至資料來源</div>';
  }
  btn.disabled = false;
}

function startCountdown() {
  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  secondsLeft = 60;
  tick();
  countdownTimer = setInterval(() => {
    secondsLeft--;
    tick();
    if (secondsLeft <= 0) clearInterval(countdownTimer);
  }, 1000);
  refreshTimer = setTimeout(() => fetchData(false), 60000);
}

function tick() {
  const t = new Date().toLocaleTimeString('zh-TW');
  statusText.innerHTML = `已載入 ${t}`;
}


function signerStatus(s) {
  if (!s) return 'waiting';
  const l = s.toLowerCase();
  if (l === 'completed') return 'done';
  if (l === 'sent' || l === 'delivered') return 'pending';
  return 'waiting';
}
function signerLabel(s) {
  if (!s) return '待送出';
  const l = s.toLowerCase();
  if (l === 'completed') return '已簽署';
  if (l === 'sent')      return '待簽署';
  if (l === 'delivered') return '已送達';
  return s;
}
function renderStats(s) {
  output.innerHTML = `
    <div class="results">
      <div class="card">
        <div class="card-head"><div class="clinic-name">合約統計</div></div>
        <div style="padding:20px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center;">
          <div>
            <div style="font-size:28px;font-weight:600;color:#548EB8">${s.sent}</div>
            <div style="font-size:11px;color:#5A6A7A;margin-top:4px">已送出</div>
          </div>
          <div>
            <div style="font-size:28px;font-weight:600;color:#4A7A65">${s.completed}</div>
            <div style="font-size:11px;color:#5A6A7A;margin-top:4px">已完成</div>
          </div>
          <div>
            <div style="font-size:28px;font-weight:600;color:#D28187">${s.voided}</div>
            <div style="font-size:11px;color:#5A6A7A;margin-top:4px">作廢</div>
          </div>
        </div>
      </div>
    </div>`;
}
  
function renderContracts(contracts) {
  if (!contracts || contracts.length === 0) {
    output.innerHTML = '<div class="message empty">找不到合約紀錄</div>';
    return;
  }
  const html = contracts.map(c => {
    const signers = [
      { role: 'AM',   name: c.signer1Name, st: signerStatus(c.signer1Status), label: signerLabel(c.signer1Status), date: c.signer1SignedAt },
      { role: '財務', name: c.signer2Name, st: signerStatus(c.signer2Status), label: signerLabel(c.signer2Status), date: c.signer2SignedAt },
      { role: '客戶', name: c.signer3Name, st: signerStatus(c.signer3Status), label: signerLabel(c.signer3Status), date: c.signer3SignedAt },
    ];
    const doneCount = signers.filter(s => s.st === 'done').length;
    const allDone   = doneCount === 3;

    const stepsHtml = signers.map((s, i) => `
      <div class="step ${s.st}">
        <div class="step-icon">${s.st === 'done' ? '&#10003;' : (i + 1)}</div>
        <div class="step-label">${s.label}</div>
        <div class="step-name" title="${s.name}">${s.name || '—'}</div>
      </div>`).join('');

    const datesHtml = signers.map(s => `
      <div class="date-cell ${s.st === 'done' ? 'done' : ''}">
        <span>${s.role}</span>
        ${s.st === 'done' && s.date ? s.date : '—'}
      </div>`).join('');

    return `
      <div class="card">
        <div class="card-head">
          <div class="clinic-name">${c.clinicName || c.emailSubject || '—'}</div>
          ${c.renewalNumber ? `<div class="renewal-badge">${c.renewalNumber}</div>` : ''}
        </div>
        <div class="progress-wrap"><div class="track">${stepsHtml}</div></div>
        <div class="dates">${datesHtml}</div>
        <div class="overall ${allDone ? 'all-done' : 'in-progress'}">
          ${allDone ? '&#10003; 三方簽署完成' : `&#8999; 進行中 ${doneCount}/3 已簽署`}
        </div>
      </div>`;
  }).join('');
  output.innerHTML = `<div class="results">${html}</div>`;
}

// 有記住的查詢就自動執行
if (saved && saved.includes('||')) doSearch();
</script>
</body>
</html>
